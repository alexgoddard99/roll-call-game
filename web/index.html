<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roll Call — The Daily Congressional Vote Game</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏛️</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Source+Serif+4:ital,opsz,wght@0,8..60,300..700;1,8..60,300..700&family=Libre+Franklin:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="paper-grain" aria-hidden="true"></div>

<header class="masthead">
  <div class="dateline">
    <span id="dateline-left">…</span>
    <span class="dateline-center">★ ★ ★ ★</span>
    <span id="dateline-right">…</span>
  </div>
  <h1 class="masthead-title">Roll Call.</h1>
  <div class="masthead-tagline">
    <span>The Daily Congressional Vote Game</span>
    <span class="tagline-sep">—</span>
    <span>Five Senators. Three Bills. Fifteen Votes.</span>
  </div>
</header>

<main id="app" aria-live="polite"></main>

<footer class="colophon">
  <p>Every answer is a real recorded vote, sourced from the official roll-call
  records of the <a href="https://www.senate.gov/legislative/votes_new.htm">United States Senate</a>.
  Portraits: Biographical Directory of the U.S. Congress.</p>
</footer>

<script src="puzzles.js"></script>
<script src="app.js"></script>
</body>
</html>
